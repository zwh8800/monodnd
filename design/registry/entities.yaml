    added: "2026-05-09"

  # ── 遭遇/难度公式 ──────────────────────────────────────────────────────

  - name: encounter_cr_budget_formula
    status: active
    source: design/gdd/06-adventure-generation.md
    referenced_by:
      - design/gdd/06-adventure-generation.md
      - design/gdd/04-combat-system.md
      - design/gdd/05-map-exploration.md
    expression: "基于 DND 5e DMG p.82: 每人XP阈值 × 人数 × 敌人数量倍率"
    variables:
      - name: party_level
        symbol: PL
        type: int
        range: [1, 20]
      - name: party_size
        symbol: size
        type: int
        range: [1, 6]
        default: 4
      - name: difficulty
        symbol: diff
        type: enum
        values: [Easy, Medium, Hard, Deadly]
    quick_reference:
      "Lv1×4": { Easy: 0.5, Medium: 1.0, Hard: 1.5, Deadly: 2.0 }
      "Lv3×4": { Easy: 1.5, Medium: 3.0, Hard: 4.5, Deadly: 6.0 }
      "Lv5×4": { Easy: 2.5, Medium: 5.0, Hard: 7.5, Deadly: 10.0 }
    output_range: [0.5, 20]
    added: "2026-05-09"

  - name: difficulty_scaling_formula
    status: active
    source: design/gdd/06-adventure-generation.md
    referenced_by:
      - design/gdd/06-adventure-generation.md
      - design/gdd/04-combat-system.md
      - design/gdd/05-map-exploration.md
    expression: |
      HP 缩放: base_hp × (1 + (PL - RL) × 0.15), clamp [0.5, 2.0]
      伤害缩放: base_dmg × (1 + (PL - RL) × 0.10), clamp [0.7, 1.5]
      DC 缩放: base_dc + floor((PL - RL) × 0.5), clamp [8, 25]
    variables:
      - name: party_level
        symbol: PL
        type: int
        description: 队伍平均等级
      - name: recommended_level
        symbol: RL
        type: int
        description: 冒险推荐等级
      - name: base_value
        symbol: base
        type: float
        description: 模板基础 HP/伤害/DC
    output_range: "按各子公式分段"
    added: "2026-05-09"

  # ── 背包/负重公式 ──────────────────────────────────────────────────────

  - name: carry_capacity_slots_formula
    status: active
    source: design/gdd/01-character-system.md
    referenced_by:
      - design/gdd/01-character-system.md
      - design/gdd/03-items-equipment.md
    expression: "10 + max(0, STR_mod × 2)"
    variables:
      - name: strength_modifier
        symbol: STR_mod
        type: int
        range: [-5, 10]
        description: 力量调整值
    output_range: [10, 30]
    notes: 槽位制负重(非磅制), 非标准5e
    added: "2026-05-09"


