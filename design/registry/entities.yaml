# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input.
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added

formulas:

  # ── 核心属性公式 ────────────────────────────────────────────────────────

  - name: ability_modifier_formula
    status: active
    source: design/gdd/01-character-system.md
    referenced_by:
      - design/gdd/01-character-system.md
      - design/gdd/04-combat-system.md
      - design/gdd/05-map-exploration.md
      - design/gdd/03-items-equipment.md
    expression: "floor((score - 10) / 2)"
    variables:
      - name: ability_score
        symbol: score
        type: int
        range: [1, 30]
        description: 六项属性值之一
    output_range: [-5, 10]
    notes: DND 5e SRD 核心公式，所有检定/攻击/豁免/DC 计算的基础
    added: "2026-05-09"

  - name: proficiency_bonus_formula
    status: active
    source: design/gdd/01-character-system.md
    referenced_by:
      - design/gdd/01-character-system.md
      - design/gdd/04-combat-system.md
      - design/gdd/05-map-exploration.md
      - design/gdd/03-items-equipment.md
    expression: "floor((level - 1) / 4) + 2"
    variables:
      - name: character_level
        symbol: level
        type: int
        range: [1, 20]
        description: 角色等级
    output_range: [2, 6]
    notes: "等级→PB映射表: Lv1-4=+2, Lv5-8=+3, Lv9-12=+4, Lv13-16=+5, Lv17-20=+6"
    added: "2026-05-09"

  - name: hp_max_formula
    status: active
    source: design/gdd/01-character-system.md
    referenced_by:
      - design/gdd/01-character-system.md
      - design/gdd/04-combat-system.md
      - design/gdd/08-failure-growth.md
    expression: |
      Lv1: HitDie.max + CON_mod
      Lv2+: previous_HP + ceil(HitDie.avg) + CON_mod (最少+1)
    variables:
      - name: hit_die
        symbol: HD
        type: int
        range: [6, 12]
        description: "职业生命骰 (d6/d8/d10/d12)"
      - name: constitution_modifier
        symbol: CON_mod
        type: int
        range: [-5, 10]
        description: 体质调整值
      - name: character_level
        symbol: level
        type: int
        range: [1, 20]
        description: 角色等级
    output_range: [1, 400]
    notes: "HitDie 期望值: d6=4, d8=5, d10=6, d12=7 (向上取整)"
    added: "2026-05-09"

  - name: armor_class_formula
    status: active
    source: design/gdd/01-character-system.md
    referenced_by:
      - design/gdd/01-character-system.md
      - design/gdd/04-combat-system.md
      - design/gdd/03-items-equipment.md
    expression: |
      无甲: 10 + DEX_mod
      轻甲: base + DEX_mod
      中甲: base + min(DEX_mod, 2)
      重甲: base
      盾牌: +2
    variables:
      - name: armor_base
        symbol: base
        type: int
        range: [10, 18]
        description: 护甲基础AC值
      - name: dexterity_modifier
        symbol: DEX_mod
        type: int
        range: [-5, 10]
        description: 敏捷调整值
    output_range: [10, 25]
    notes: 全护甲表见 character-system.md §2.1.3
    added: "2026-05-09"

  # ── 战斗公式 ────────────────────────────────────────────────────────────

  - name: attack_roll_formula
    status: active
    source: design/gdd/04-combat-system.md
    referenced_by:
      - design/gdd/04-combat-system.md
      - design/gdd/01-character-system.md
      - design/gdd/03-items-equipment.md
    expression: "d20 + ability_mod + PB + other_bonuses"
    variables:
      - name: ability_modifier
        symbol: ability_mod
        type: int
        range: [-5, 10]
        description: "关联属性调整值 (近战=STR, 远程=DEX, 灵巧可选, 法术=施法属性)"
      - name: proficiency_bonus
        symbol: PB
        type: int
        range: [2, 6]
        description: 熟练加值 (若角色熟练)
      - name: other_bonuses
        symbol: other
        type: int
        description: 魔法加值/战斗风格/优势劣势
    output_range: [-5, 36]
    special_rules:
      - "自然20 = 必定命中 + 暴击"
      - "自然1 = 必定未命中"
      - "优势: 骰2取高"
      - "劣势: 骰2取低"
    added: "2026-05-09"

  - name: damage_formula
    status: active
    source: design/gdd/04-combat-system.md
    referenced_by:
      - design/gdd/04-combat-system.md
      - design/gdd/01-character-system.md
      - design/gdd/03-items-equipment.md
    expression: "weapon_die + ability_mod + other_bonuses"
    variables:
      - name: weapon_damage_die
        symbol: weapon_die
        type: dice
        range: [1d4, 2d6]
        description: 武器伤害骰
      - name: ability_modifier
        symbol: ability_mod
        type: int
        range: [-5, 10]
        description: "关联属性调整值 (近战=STR, 远程=DEX, 投掷同近战)"
      - name: other_bonuses
        symbol: other
        type: int
        description: 附魔+法术+战斗风格+毒药
    output_range: [0, 50]
    post_step: 抗性÷2 / 免疫=0 / 易伤×2 → 临时HP抵扣 → 实际HP扣除
    added: "2026-05-09"

  - name: crit_damage_formula
    status: active
    source: design/gdd/04-combat-system.md
    referenced_by:
      - design/gdd/04-combat-system.md
      - design/gdd/01-character-system.md
      - design/gdd/03-items-equipment.md
    expression: "max(weapon_die) + max(enchantment_die) + max(sneak_die) + ability_mod + other_bonuses"
    variables:
      - name: weapon_damage_die
        symbol: weapon_die
        type: dice
        description: 武器伤害骰
      - name: enchantment_die
        symbol: enchant_die
        type: dice
        description: 附魔额外伤害骰
      - name: sneak_attack_die
        symbol: sneak_die
        type: dice
        description: 偷袭骰
      - name: ability_modifier
        symbol: ability_mod
        type: int
        range: [-5, 10]
      - name: fixed_bonuses
        symbol: other
        type: int
        description: 固定加值(保持不变)
    output_range: [武器最大骰+加值, 100]
    notes: "⚠️ 非标准5e: 本游戏自然20时伤害骰取最大值(标准5e是双倍骰数)"
    added: "2026-05-09"

  - name: initiative_formula
    status: active
    source: design/gdd/04-combat-system.md
    referenced_by:
      - design/gdd/04-combat-system.md
      - design/gdd/01-character-system.md
    expression: "d20 + DEX_mod + other_bonuses"
    variables:
      - name: dexterity_modifier
        symbol: DEX_mod
        type: int
        range: [-5, 10]
        description: 敏捷调整值
      - name: other_bonuses
        symbol: other
        type: int
        description: Alert专长(+5), 装备加值
    output_range: [-5, 35]
    rules: "每轮重骰先攻(偏离标准5e)"
    notes: "已确认: combat-system §1.3 已修正为'每轮重骰先攻', 与 GDD-v1.md §5.4 一致。修复日期 2026-05-09"
    added: "2026-05-09"

  - name: spell_save_dc_formula
    status: active
    source: design/gdd/04-combat-system.md
    referenced_by:
      - design/gdd/04-combat-system.md
      - design/gdd/01-character-system.md
    expression: "8 + PB + spellcasting_ability_mod"
    variables:
      - name: proficiency_bonus
        symbol: PB
        type: int
        range: [2, 6]
      - name: spellcasting_ability_modifier
        symbol: spell_ability_mod
        type: int
        range: [-5, 10]
        description: "施法属性调整值 (INT=法师, WIS=牧师, CHA=术士)"
    output_range: [5, 24]
    related: 战技DC = "8 + PB + STR/DEX_mod"
    added: "2026-05-09"

  - name: spell_attack_mod_formula
    status: active
    source: design/gdd/04-combat-system.md
    referenced_by:
      - design/gdd/04-combat-system.md
      - design/gdd/01-character-system.md
    expression: "PB + spellcasting_ability_mod"
    variables:
      - name: proficiency_bonus
        symbol: PB
        type: int
        range: [2, 6]
      - name: spellcasting_ability_modifier
        symbol: spell_ability_mod
        type: int
        range: [-5, 10]
    output_range: [-3, 16]
    added: "2026-05-09"

  - name: saving_throw_formula
    status: active
    source: design/gdd/04-combat-system.md
    referenced_by:
      - design/gdd/04-combat-system.md
      - design/gdd/01-character-system.md
    expression: "d20 + ability_mod + (if proficient then PB else 0)"
    variables:
      - name: ability_modifier
        symbol: ability_mod
        type: int
        range: [-5, 10]
        description: 六项属性调整值之一
      - name: proficiency_bonus
        symbol: PB
        type: int
        range: [2, 6]
      - name: is_proficient
        symbol: prof
        type: bool
        description: 角色是否熟练此项豁免
    output_range: "d20决定, 比对DC"
    added: "2026-05-09"

  - name: concentration_check_dc_formula
    status: active
    source: design/gdd/04-combat-system.md
    referenced_by:
      - design/gdd/04-combat-system.md
      - design/gdd/01-character-system.md
    expression: "max(10, damage / 2)"
    variables:
      - name: damage_taken
        symbol: damage
        type: int
        range: [0, null]
        description: 受到的伤害值
    output_range: [10, 50]
    notes: "使用 CON 豁免进行检定; 角色可主动解除专注(无需动作)"
    added: "2026-05-09"

  - name: death_save_rule
    status: active
    source: design/gdd/04-combat-system.md
    referenced_by:
      - design/gdd/04-combat-system.md
      - design/gdd/08-failure-growth.md
      - design/gdd/01-character-system.md
    expression: |
      双轨机制:
        轨道1: rounds_without_healing >= 3 → 死亡
        轨道2: death_failures >= 3 → 死亡
      每次受伤: death_failures + 2
    variables:
      - name: rounds_without_healing
        symbol: rounds_no_heal
        type: int
        range: [0, 3]
      - name: death_failures
        symbol: deaths_fails
        type: int
        range: [0, 3]
    output_range: alive / dead
    notes: "双轨机制: ①3轮无治疗=死亡(主要); ②HP=0时受伤death_failures+2, ≥3=死亡(次要)。无d20死亡豁免骰。修复日期 2026-05-09"
    added: "2026-05-09"

  # ── 技能/探索公式 ──────────────────────────────────────────────────────

  - name: passive_perception_formula
    status: active
    source: design/gdd/01-character-system.md
    referenced_by:
