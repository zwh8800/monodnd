          good: 0.9
          worn: 0.65
          damaged: 0.35
          broken: 0.05
    output_range: [0, 500000]
    notes: "已对齐: 08-failure-growth.md §11.1 和 07-tavern-system.md 的卖价公式已统一为 0.3 基准乘数。修复日期 2026-05-09"
