      - "Lv11-15: +3"
      - "Lv16-20: +4"
    output_range: [0, 4300]
    notes: "已确认: 以 failure-growth §7.6 的 floor(xp/500) 为准, character-system 原写 floor(xp/1000) 已废弃。修复日期 2026-05-09"
    added: "2026-05-09"

  # ── 经济公式 ────────────────────────────────────────────────────────────

  - name: item_price_formula
    status: active
