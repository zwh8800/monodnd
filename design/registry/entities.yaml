        type: int
        range: [-5, 10]
      - name: proficiency_bonus
        symbol: PB
        type: int
        range: [2, 6]
      - name: perception_proficient
        symbol: has_perception
        type: bool
        description: 是否熟练察觉技能
    output_range: [5, 26]
    notes: "同类: 被动调查 = 10 + INT_mod + (感知熟练? PB : 0)"
    added: "2026-05-09"

  - name: skill_check_formula
    status: active
    source: design/gdd/01-character-system.md
    referenced_by:
      - design/gdd/01-character-system.md
      - design/gdd/05-map-exploration.md
      - design/gdd/04-combat-system.md
      - design/gdd/06-adventure-generation.md
    expression: "ability_mod + (if proficient then PB else 0) + (if expertise then PB*2 else 0)"
    variables:
      - name: ability_modifier
        symbol: ability_mod
        type: int
        range: [-5, 10]
        description: 18项技能关联的六项属性之一
      - name: proficiency_bonus
        symbol: PB
        type: int
        range: [2, 6]
      - name: skill_proficiency
        symbol: proficiency_level
        type: enum
        values: [none, proficient, expertise, jack_of_all_trades]
        description: "none=无PB; proficient=PB; expertise=PB×2; jack=floor(PB/2)"
    output_range: [-5, 22]
    notes: 18项技能详见 character-system.md §2.6
    added: "2026-05-09"

  # ── 经验/传承公式 ──────────────────────────────────────────────────────

  - name: xp_base_encounter_formula
    status: active
    source: design/gdd/08-failure-growth.md
    referenced_by:
      - design/gdd/08-failure-growth.md
      - design/gdd/06-adventure-generation.md
