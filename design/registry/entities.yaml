    variables:
      - name: base_value
        symbol: base_value
        type: int
        unit: gp
        description: 物品基础价格
      - name: rarity
        symbol: rarity
        type: enum
        values: [common, uncommon, rare, very_rare, legendary, artifact]
        multipliers:
