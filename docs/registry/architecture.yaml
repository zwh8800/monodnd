# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: game_framework
    status: active
    api: MonoGame 3.8.5+ / C# 12 / .NET 8
    not: "Godot 4.x / Unity 6 / GameMaker / Pygame（详细对比见 adr-0000）"
    adr: docs/architecture/adr-0000-engine-selection.md
    reason: "AI-First 范式下编译期类型安全 + 零跨域混淆 + 代码即场景是最优组合"
    referenced_by:
      - docs/architecture/adr-0000-engine-selection.md
      - docs/architecture/adr-0001-ecs-architecture.md
    added: 2026-05-06
    revised: ""

  - purpose: ecs_architecture
    status: active
    api: 自定义 Scene/Entity/Component/SceneComponent（src/DndGame/Core/）
    not: Nez 框架（过度设计，AI 训练数据不足）
    adr: docs/architecture/adr-0001-ecs-architecture.md
    reason: "415 行自定义 ECS 满足所有需求；零外部依赖；AI 可完全理解；API 面与 Nez 行为兼容"
    referenced_by:
      - docs/architecture/adr-0001-ecs-architecture.md
    added: 2026-05-06
    revised: ""

  - purpose: http_client
    status: active
    api: System.Net.Http.HttpClient（.NET 标准库）
    not: UnityWebRequest / Godot HTTPRequest
    adr: docs/architecture/adr-0000-engine-selection.md
    reason: ".NET 标准库，零第三方依赖，async/await 原生支持"
    referenced_by:
      - docs/architecture/adr-0000-engine-selection.md
      - docs/architecture/adr-0004-llm-integration.md
    added: 2026-05-06
    revised: ""

  - purpose: json_serialization
    status: active
    api: System.Text.Json（.NET 标准库）
    not: Newtonsoft.Json / Godot JSON
    adr: docs/architecture/adr-0000-engine-selection.md
    reason: ".NET 高性能 JSON 库，支持 record 类型和 snake_case 映射"
    referenced_by:
      - docs/architecture/adr-0000-engine-selection.md
      - docs/architecture/adr-0005-data-driven-design.md
    added: 2026-05-06
    revised: ""

  - purpose: sqlite_orm
    status: active
    api: sqlite-net（NuGet 包）
    not: Microsoft.Data.Sqlite（底层 ADO.NET）/ Entity Framework Core（过度设计）
    adr: docs/architecture/adr-0005-data-driven-design.md
    reason: "轻量 ORM，PCL 兼容，支持异步查询，适合游戏存档场景"
    referenced_by:
      - docs/architecture/adr-0005-data-driven-design.md
    added: 2026-05-06
    revised: ""

  - purpose: json_schema_validation
    status: active
    api: JsonSchema.Net（NuGet 包）
    not: 自定义验证逻辑
    adr: docs/architecture/adr-0004-llm-integration.md
    reason: "标准 JSON Schema 验证，支持 Draft 2020-12，用于验证 LLM 输出"
    referenced_by:
      - docs/architecture/adr-0004-llm-integration.md
    added: 2026-05-06
    revised: ""

