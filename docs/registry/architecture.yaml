# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: hardcoded_game_numerics
    status: active
    description: "C# 代码中禁止出现魔法数字（如 return 10;）。所有游戏数值必须从 JSON 配置文件加载或使用命名常量。"
    why: "硬编码数值使 AI 修改时容易引入逻辑错误，且无法通过 JSON Schema 独立验证。违反数据驱动设计原则。"
    adr: docs/architecture/adr-0005-data-driven-design.md
    added: 2026-05-06

  - pattern: llm_deciding_mechanics
    status: active
    description: "LLM 不能决定任何机械结果：伤害数值、检定 DC、战利品掉落、故事分支条件、设施状态变更——这些全部由程序控制。"
    why: "LLM 输出不可控和不一致。允许 LLM 决策数值意味着放弃游戏平衡和可测试性。"
    adr: docs/architecture/adr-0004-llm-integration.md
    added: 2026-05-06

  - pattern: direct_cross_system_reference
    status: active
    description: "系统间禁止直接引用对方的具体类（如 CombatEngine 不能有 CharacterSystem 的 using）。所有跨系统通信必须通过 IEventBus。"
    why: "直接引用产生强耦合，违反模块化架构原则。使单元测试无法隔离，也增加 AI 生成代码的出错风险。"
    adr: docs/architecture/adr-0003-event-bus.md
    added: 2026-05-06

  - pattern: ms_dependency_injection_container
    status: active
    description: "不使用 Microsoft.Extensions.DependencyInjection 或其他 DI 容器替代 ServiceLocator。"
    why: "MonoGame 的 Game 由框架实例化，无构造函数注入入口。MS DI 的核心优势在此项目中无法发挥，反而增加外部依赖和 AI 的 API 混淆风险。"
    adr: docs/architecture/adr-0002-service-locator.md
    added: 2026-05-06

  - pattern: unity_api_in_codebase
    status: active
    description: "代码库中不允许出现 Unity API 调用：MonoBehaviour、GameObject、Start()/Update() 约定、Transform、Instantiate 等。"
    why: "MonoGame 与 Unity 无 API 交集。任何 Unity API 的出现说明 AI 产生了跨域混淆——即使在 Godot C# 中也很常见。"
    adr: docs/architecture/adr-0000-engine-selection.md
    added: 2026-05-06

